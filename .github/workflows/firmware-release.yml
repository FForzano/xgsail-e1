name: Firmware build & release

# Builds firmware/sailframes_edge with arduino-cli and publishes the
# flashable binaries. Triggered by a version tag (v1.2.3) or manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Also create a draft GitHub release with the binaries'
        type: boolean
        default: false

permissions:
  contents: write

env:
  SKETCH: firmware/sailframes_edge
  # Board settings from firmware/README.md ("Building and flashing").
  # PartitionScheme=custom selects the sketch-local partitions.csv (dual-app
  # OTA-capable table; see docs/ota.md). The merge step's offsets are
  # unchanged — app0 still lands at 0x10000, otadata/boot_app0 at 0xe000.
  FQBN: esp32:esp32:esp32:PartitionScheme=custom,FlashFreq=80,UploadSpeed=921600
  ESP32_CORE_VERSION: '3.3.7'
  NIMBLE_VERSION: '2.4.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core (pinned)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@${ESP32_CORE_VERSION}

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install \
            "TFT_eSPI" \
            "Adafruit BNO08x" \
            "Adafruit DPS310" \
            "NimBLE-Arduino@${NIMBLE_VERSION}" \
            "ArduinoJson"

      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --warnings default \
            --export-binaries \
            "$SKETCH"

      - name: Merge into a single flashable image
        id: merge
        run: |
          BUILD_DIR="$SKETCH/build/esp32.esp32.esp32"
          CORE_DIR="$HOME/.arduino15/packages/esp32/hardware/esp32/$ESP32_CORE_VERSION"
          VERSION="${GITHUB_REF_NAME}"
          case "$GITHUB_REF" in refs/tags/*) ;; *) VERSION="${GITHUB_SHA::7}" ;; esac
          OUT="artifacts"
          mkdir -p "$OUT"

          pip install --quiet esptool
          python -m esptool --chip esp32 merge_bin \
            -o "$OUT/sailframes_edge-${VERSION}-merged.bin" \
            --flash_mode dio --flash_freq 80m --flash_size 4MB \
            0x1000  "$BUILD_DIR/sailframes_edge.ino.bootloader.bin" \
            0x8000  "$BUILD_DIR/sailframes_edge.ino.partitions.bin" \
            0xe000  "$CORE_DIR/tools/partitions/boot_app0.bin" \
            0x10000 "$BUILD_DIR/sailframes_edge.ino.bin"

          cp "$BUILD_DIR/sailframes_edge.ino.bin"            "$OUT/sailframes_edge-${VERSION}-app.bin"
          cp "$BUILD_DIR/sailframes_edge.ino.bootloader.bin" "$OUT/sailframes_edge-${VERSION}-bootloader.bin"
          cp "$BUILD_DIR/sailframes_edge.ino.partitions.bin" "$OUT/sailframes_edge-${VERSION}-partitions.bin"
          cp "$CORE_DIR/tools/partitions/boot_app0.bin"      "$OUT/boot_app0.bin"
          (cd "$OUT" && sha256sum *.bin > SHA256SUMS.txt)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: sailframes_edge-${{ steps.merge.outputs.version }}
          path: artifacts/

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          body: |
            E1 firmware `${{ steps.merge.outputs.version }}`
            (ESP32 Arduino core ${{ env.ESP32_CORE_VERSION }}, 4MB default partition scheme).

            Flash the whole device (erases the app, not the SD card):

            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash 0x0 sailframes_edge-${{ steps.merge.outputs.version }}-merged.bin
            ```

            Or the app only, on a board already carrying this bootloader:

            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash 0x10000 sailframes_edge-${{ steps.merge.outputs.version }}-app.bin
            ```
